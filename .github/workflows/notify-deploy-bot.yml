name: Notify Deploy Bot

on:
  push:
    branches:
      - '**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify deployment bot
        run: |
          curl -X POST https://api.github.com/repos/infinit-websites-factory/infinit-deploy-bot/dispatches \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{
              "event_type": "deploy",
              "client_payload": {
                "repo": "${{ github.repository }}",
                "branch": "${{ github.ref_name }}"
              }
            }'
